<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="signin.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>KinoLuxe</title>
    
</head>
<body>
<a href="file:///D:/Рабочий стол/praktika proekt/index.html" class="a1" id="logo">KinoLuxe</a>
<div class="d1">
<p class="p1"><b>Sign In</b></p>
<input id="i1" type="text" placeholder="Email or mobile number">
<input id="i2" type="password" placeholder="Password">
<button class="b1" onclick="login()">Sign In</button>
<input class="i3" type="checkbox">
<p class="p2">Remember me</p>
<p id="error"></p>
</div>

<script>
    const logo = document.getElementById("logo");

    
    const colors = ["red", "magenta", "gold", "lightblue"];

    let i = 0;

    setInterval(() => {
        logo.style.color = colors[i];
        i = (i + 1) % colors.length;
    }, 600); 
	
function login() {
    let email = document.getElementById("i1").value;
    let pass = document.getElementById("i2").value;
    let err = document.getElementById("error");

    if(email === "" || pass === ""){
        err.textContent = "Please fill in all fields";
        return;
    }

    
    if(email === "test@gmail.com" && pass === "1234"){
        window.location.href = "topoat.html";
    } else {
        err.textContent = "Սխալ email կամ գաղտնաբառ";
    }
}
</script>

</body>

</html>
