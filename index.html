<!DOCTYPE html>
<html lang="en">>
<head>

	<link rel="stylesheet" type="text/css" href="style.css">
	<title>KinoLuxe</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

	<a href="file:///D:/Рабочий стол/praktika proekt/index1.html" class="a1" id="logo">KinoLuxe</a>
	
	<button class="b1" onclick="location.href='signin.html'">Sign In</button>

<div class="d">
	
	<p class="a3"><b>Unlimited movies,TV <br> shows, and more</b></p>
	<div class="d1">
	
	<p class="a5">Ready to watch? Enter your email to create or restart your membership.</p>
</div>
</div>
	<form class="i" id="emailForm">
    <input type="email" id="userEmail" placeholder="Enter your Email" required>
    <button type="submit" class="g">Get Started</button>
</form>


<script>
	
    
    const emailForm = document.getElementById("emailForm");
    const emailInput = document.getElementById("userEmail");

    // Սա փոխում է սխալի տեքստը անգլերենի
    emailInput.oninvalid = function(e) {
        e.target.setCustomValidity("");
        if (!e.target.validity.valid) {
            e.target.setCustomValidity("Please fill out this field");
        }
    };

    // Սա մաքրում է սխալը, երբ սկսում ես գրել
    emailInput.oninput = function(e) {
        e.target.setCustomValidity("");
    };

    emailForm.addEventListener("submit", function(event) {
        event.preventDefault(); // Կանխում է էջի թարմացումը
        
        if (emailInput.checkValidity()) {
            console.log("Redirecting to topoat.html...");
            window.location.href = "topoat.html";
        }
    });
    const logo = document.getElementById("logo");

    
    const colors = ["red", "magenta", "gold", "lightblue"];

    let i = 0;

    setInterval(() => {
        logo.style.color = colors[i];
        i = (i + 1) % colors.length;
    }, 600); 
</script>	
</body>
</html>
